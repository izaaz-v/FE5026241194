<!doctype html>
<html lang="en">
  <head>
    <title>Responsive Web</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
  </head>

  <body>
    <div class="container">
      <div class="jumbotron text-center mt-4">
        <h1 class="display-3">Selamat Datang</h1>
        <p class="lead">Pemrograman Web</p>
        <hr class="my-2" />
        <p>More info</p>
        <p class="lead">
          <a class="btn btn-primary btn-lg" href="#" role="button"
            >Klik Disini</a
          >
        </p>
      </div>

      <div class="row">
        <div class="col-md-6 bg-success py-2">row 1 col 1</div>
        <div class="col-md-6 bg-primary py-2">row 1 col 2</div>
      </div>
      <div class="row mb-4">
        <div class="col-md-6 pt-1">row 2 col 1</div>
        <div class="col-md-6 pt-1">row 2 col 2</div>
      </div>

      <div class="row border pt-3 pb-3 mb-1">
        <div class="col-md-4 border-right">row 1 col 1</div>
        <div class="col-md-8">
          <div class="mb-2">row 1 col 2</div>
          <div class="row">
            <div class="col-md-6 border py-2 ml-3">
              grid dicel 2 ,row 2 col 2
            </div>
            <div class="col-md-5 py-2">grid dicel 2 ,row 2 col 2</div>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col-md-4 pt-1">row 2 col 1</div>
        <div class="col-md-8 pt-1 text-center">row 2 col 2</div>
      </div>
    </div>
  </body>
</html>
