<!doctype html>
<html lang="en">
  <head>
    <title>Responsive Web</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>

          <a class="btn btn-primary btn-lg" href="#" role="button"

          >
        </p>
      </div>
    </div>
    <div class="row">
      <div class="col">
        <p style="color: crimson">row 1 col 1</p>
      </div>
      <div class="col">
        <p style="color: crimson">row 1 col 2</p>
      </div>
    </div>
    <div class="row">

        <div class="col">
          <p style="color: cyan">row 2 col 1</p>
        </div>
      <div class="col">
        <p style="color: cyan">row 2 col 2</p>
      </div>
