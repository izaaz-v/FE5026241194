    <style>
      :root{

      html,body{height:100%;margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,'Helvetica Neue',Arial}

      .content h1{margin:0 0 6px 0;font-size:1.5rem;line-height:1.15}
      .content p{margin:0;color:var(--muted);font-size:1rem;line-height:1.5}
      .meta{margin-top:12px;color:var(--muted);font-size:.9rem}
      @media (max-width:620px){.card{flex-direction:column;align-items:flex-start}.avatar{width:76px;height:76px}}

        </p>

      </div>
    </main>
  </body>
